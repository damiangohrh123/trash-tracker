name: trash_tracker
description: On-device trash classification with YOLO TFLite.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  tflite_flutter: ^0.11.0
  image: ^4.2.0
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/best_float32.tflite
    - assets/labels.txt
